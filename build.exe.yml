name: Compilar DAZALUD CARPETAS (.exe)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  compilar:
    runs-on: windows-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Compilar el .exe
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --icon=icono.ico
          --name "DAZALUD_CARPETAS"
          --add-data "icono.ico;."
          main.py

      - name: Subir el ejecutable como artifact
        uses: actions/upload-artifact@v4
        with:
          name: DAZALUD_CARPETAS-exe
          path: dist/DAZALUD_CARPETAS.exe
